<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Inspection Tool - IACS 47 & BKI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        
        /* Gaya Input & Preview */
        .upload-area { border: 3px dashed #bdc3c7; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; background: #fbfcfc; }
        .upload-area:hover { border-color: #3498db; background: #ecf0f1; }
        #imageInput { display: none; }
        #preview-img { width: 100%; max-height: 280px; object-fit: cover; display: none; border-radius: 10px; margin-top: 15px; border: 2px solid #3498db; }
        
        /* Tombol Utama */
        .btn-ai { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-ai:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-ai:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Gaya Loading */
        #loadingBar { display: none; text-align: center; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Panel Hasil AI */
        .result-panel { background: white; border: 2px solid #3498db; padding: 20px; border-radius: 12px; margin-top: 20px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .badge-ai { background: #8e44ad; color: white; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; float: right; }
        .rule-card { background: #f8f9fa; border-left: 5px solid #bdc3c7; padding: 10px; margin-top: 10px; border-radius: 4px; }
        .rule-reject { border-left-color: #e74c3c; background: #fdedec; }
        
        /* Input Angka Final */
        #finalMeasure { display: none; background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚢 ShipScan AI</h2>
    
    <div class="form-group">
        <label>1. Ambil/Upload Foto Temuan</label>
        <div class="upload-area" onclick="document.getElementById('imageInput').click()">
            <span style="font-size: 40px;">📷</span><br>
            <span>Klik untuk Kamera / Upload</span>
        </div>
        <input type="file" id="imageInput" accept="image/*" capture="camera" onchange="previewImage(event)">
        <img id="preview-img" src="#" alt="Preview">
    </div>

    <button id="aiButton" class="btn-ai" onclick="startAIAnalysis()" disabled>🤖 ANALISA DENGAN AI (IACS/BKI)</button>

    <div id="loadingBar">
        <div class="spinner"></div>
        <p style="color: #3498db;">Sedang menganalisa foto temuan...</p>
    </div>

    <div id="resultPanel" class="result-panel">
        <span class="badge-ai">Simulasi AI</span>
        <h3 style="color: #2c3e50; margin-top: 0;">Hasil Deteksi Otomatis</h3>
        
        <p><strong>Temuan Dominan:</strong> <span id="detectedIssue" style="font-weight:bold; color: #8e44ad;">Memuat...</span></p>
        <p>Aplikasi telah memindai foto dan mencocokannya dengan aturan yang relevan.</p>
        
        <div id="rulesList"></div>

        <div id="finalMeasure">
            <label id="measureLabel">Verifikasi Angka Ukur (mm):</label>
            <input type="number" id="measureValue" placeholder="Contoh: 5" oninput="finalDecision()">
            <button class="btn-ai" style="background:#27ae60; margin-top:10px" onclick="saveReport()">SIMPAN LAPORAN</button>
        </div>
    </div>
</div>

<script>
    // Database Aturan Lengkap IACS 47 & BKI
    const iacs_bki_rules = [
        { id: "welding", name: "Visual Weld Defect (Surfaces/Cracks)", ref_iacs: "IACS 47 Table 9.1", ref_bki: "BKI Pt 1 Vol II Sec 12", keywords: ["weld", "las", "crack"] },
        { id: "alignment", name: "Hull Plate Alignment (Misalignment)", ref_iacs: "IACS 47 Sec 5.2", ref_bki: "BKI Pt 1 Vol II Sec 1", keywords: ["align", "fitup", "gap"], unit: "mm", limit: 3 },
        { id: "corrosion", name: "Material Corrosion/Wastage", ref_iacs: "IACS No. 47 repair standard", ref_bki: "BKI Pt 1 Vol II Sec 1", keywords: ["rust", "karat", "corros", "wastage"], unit: "% wastage", limit: 20 },
        { id: "tightness", name: "Tightness/Leakage Test", ref_iacs: "IACS 47 Sec 10", keywords: ["leak", "bocor", "hose"] }
    ];

    let currentFile = null;
    let detectedRule = null;

    // 1. Preview Foto
    function previewImage(event) {
        currentFile = event.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            const out = document.getElementById('preview-img');
            out.src = reader.result;
            out.style.display = 'block';
            document.getElementById('aiButton').disabled = false; // Aktifkan tombol AI
            document.getElementById('resultPanel').style.display = 'none'; // Sembunyikan hasil lama
        }
        reader.readAsDataURL(currentFile);
    }

    // 2. Memulai "Simulasi" Analisa AI
    function startAIAnalysis() {
        const btn = document.getElementById('aiButton');
        const loading = document.getElementById('loadingBar');
        const panel = document.getElementById('resultPanel');

        btn.disabled = true;
        btn.innerText = "⏳ Sedang Memindai Gambar...";
        loading.style.display = 'block';
        panel.style.display = 'none';

        // Simulasi delay jaringan/pemrosesan (2 detik)
        setTimeout(() => {
            loading.style.display = 'none';
            btn.innerText = "🤖 ANALISA DENGAN AI (IACS/BKI)";
            btn.disabled = false;
            performSmartDetection();
        }, 2000);
    }

    // 3. Logika "Deteksi Pintar" (Simulasi Computer Vision)
    function performSmartDetection() {
        const panel = document.getElementById('resultPanel');
        const issueTitle = document.getElementById('detectedIssue');
        const rulesList = document.getElementById('rulesList');
        const finalInput = document.getElementById('finalMeasure');
        
        rulesList.innerHTML = ""; // Reset list
        panel.style.display = 'block';
        finalInput.style.display = 'none'; // Sembunyikan input angka dulu

        // Ambil nama file dan ubah ke huruf kecil untuk dicocokkan dengan keywords
        const fileName = currentFile ? currentFile.name.toLowerCase() : "";
        detectedRule = null;

        // Mencari aturan berdasarkan kata kunci di nama file
        for (let rule of iacs_bki_rules) {
            if (rule.keywords.some(key => fileName.includes(key))) {
                detectedRule = rule;
                break;
            }
        }

        // Jika tidak ketemu di nama file, ambil aturan acak/probabilitas
        if (!detectedRule) {
            detectedRule = iacs_bki_rules[Math.floor(Math.random() * iacs_bki_rules.length)];
        }

        issueTitle.innerText = detectedRule.name;

        // Menampilkan kartu aturan yang relevan
        let rulesHTML = `<div class="rule-card"><strong>Referensi IACS:</strong> ${detectedRule.ref_iacs}</div>`;
        if(detectedRule.ref_bki) {
            rulesHTML += `<div class="rule-card"><strong>Referensi BKI:</strong> ${detectedRule.ref_bki}</div>`;
        }
        
        // Cek apakah aturan butuh angka ukur (Decision Support)
        if(detectedRule.limit) {
            rulesHTML += `<div class="rule-card rule-reject"><strong>Validasi Diperlukan:</strong> Aturan memerlukan angka pengukuran fisik untuk memberikan vonis FINAL. Batas toleransi adalah ${detectedRule.limit}${detectedRule.unit}.</div>`;
            
            // Munculkan input angka
            finalInput.style.display = 'block';
            document.getElementById('measureLabel').innerText = `Masukkan Angka Ukur (${detectedRule.unit}):`;
        } else {
            rulesHTML += `<div class="rule-card"><strong>Analisa Visual AI:</strong> Temuan terdeteksi secara visual namun tidak memerlukan input angka spesifik untuk prototipe ini.</div>`;
            rulesHTML += `<div class="rule-card" style="background:#d4edda; border-left-color:#28a745"><strong>Rekomendasi:</strong> Lakukan perbaikan standar sesuai standar pembuatan kapal IACS No. 47.</div>`;
        }

        rulesList.innerHTML = rulesHTML;
    }

    // 4. Finalisasi Berdasarkan Angka Ukur
    function finalDecision() {
        const val = parseFloat(document.getElementById('measureValue').value);
        if(isNaN(val) || !detectedRule) return;

        const rulesList = document.getElementById('rulesList');
        const lastCard = rulesList.lastElementChild;

        if(val > detectedRule.limit) {
            lastCard.className = "rule-card rule-reject";
            lastCard.innerHTML = `<strong>VONIS REJECT (${val}${detectedRule.unit}):</strong> Nilai melebihi batas toleransi ${detectedRule.limit}${detectedRule.unit}. <br><strong>Tindakan:</strong> Perbaikan (Crop&Renew/Re-fit) wajib dilakukan sesuai IACS No. 47.`;
        } else {
            lastCard.className = "rule-card";
            lastCard.style.cssText = "background:#d4edda; border-left-color:#28a745";
            lastCard.innerHTML = `<strong>VONIS ACCEPT (${val}${detectedRule.unit}):</strong> Nilai masih dalam batas toleransi.`;
        }
    }

    function saveReport() {
        alert("Laporan berhasil disimpan secara lokal.");
        location.reload();
    }
</script>

</body>
</html>
