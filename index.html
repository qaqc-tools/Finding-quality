<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ship Inspection - IACS 47/BKI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a3a5a; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        #preview-img { width: 100%; max-height: 250px; object-fit: cover; display: none; border-radius: 8px; margin-top: 10px; border: 2px dashed #3498db; }
        
        /* Panel Analisis */
        .analysis-panel { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 10px; }
        .status-reject { background: #e74c3c; }
        .status-accept { background: #27ae60; }
        
        .btn-save { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .card { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-top: 10px; display: flex; gap: 12px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h2>🚢 Smart Inspection v2</h2>
    
    <div class="form-group">
        <label>1. Foto Temuan</label>
        <input type="file" id="imageInput" accept="image/*" capture="camera" onchange="previewImage(event)">
        <img id="preview-img" src="#" alt="Preview">
    </div>

    <div class="form-group">
        <label>2. Pilih Komponen/Rule</label>
        <select id="categorySelect" onchange="showMeasurement()">
            <option value="">-- Pilih Kategori --</option>
            <option value="misalignment">Plate Alignment (IACS 47)</option>
            <option value="corrosion">Hull Plate Thickness (BKI)</option>
            <option value="welding">Weld Surface (IACS 47)</option>
        </select>
    </div>

    <div id="measurementInput" class="form-group" style="display:none; background: #fff3cd; padding: 15px; border-radius: 8px;">
        <label id="measureLabel">Masukkan Nilai Ukur:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="measureValue" placeholder="Contoh: 5" oninput="runAnalysis()">
            <span id="unitText" style="align-self: center; font-weight: bold;">mm</span>
        </div>
        <small id="infoLimit" style="color: #856404;"></small>
    </div>

    <div id="analysisPanel" class="analysis-panel">
        <div id="statusBadge" class="status-badge">REJECTED</div>
        <p><strong>Analisis IACS/BKI:</strong><br><span id="analysisText"></span></p>
        
        <label>Corrective Action (CA):</label>
        <textarea id="caText" rows="2"></textarea>
        
        <label style="margin-top:10px">Preventive Action (PA):</label>
        <textarea id="paText" rows="2"></textarea>
        
        <button class="btn-save" onclick="saveData()">Simpan Laporan</button>
    </div>
</div>

<div class="container" style="margin-top: 20px;">
    <h3>📋 Antrean Laporan (Local)</h3>
    <div id="dashboardList"></div>
</div>

<script>
    // Database Aturan dengan Batas Angka (Limits)
    const rulesDB = {
        "misalignment": {
            "name": "Plate Misalignment",
            "limit": 3, // Maksimal 3mm sesuai IACS 47 standar
            "unit": "mm",
            "ref": "IACS 47 Sec 5.2",
            "info": "Batas maksimal penyimpangan adalah 3.0 mm.",
            "ca_fail": "Lakukan pemotongan dan penyetelan ulang (re-fit) hingga offset < 3mm.",
            "pa": "Perketat inspeksi fit-up sebelum pengelasan."
        },
        "corrosion": {
            "name": "Plate Corrosion",
            "limit": 20, // Maksimal 20% pengurangan ketebalan
            "unit": "%",
            "ref": "BKI Vol II Sec 12",
            "info": "Batas maksimal pengurangan ketebalan (wastage) adalah 20%.",
            "ca_fail": "Lakukan peremajaan pelat (Crop & Renew).",
            "pa": "Audit sistem pengecatan dan proteksi katodik."
        }
    };

    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = () => {
            const out = document.getElementById('preview-img');
            out.src = reader.result;
            out.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function showMeasurement() {
        const cat = document.getElementById('categorySelect').value;
        const panel = document.getElementById('measurementInput');
        if(cat && rulesDB[cat]) {
            document.getElementById('measureLabel').innerText = `Masukkan ${rulesDB[cat].name} (${rulesDB[cat].unit}):`;
            document.getElementById('unitText').innerText = rulesDB[cat].unit;
            document.getElementById('infoLimit').innerText = rulesDB[cat].info;
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
            document.getElementById('analysisPanel').style.display = 'none';
        }
    }

    function runAnalysis() {
        const cat = document.getElementById('categorySelect').value;
        const val = parseFloat(document.getElementById('measureValue').value);
        const panel = document.getElementById('analysisPanel');
        const badge = document.getElementById('statusBadge');
        
        if(!cat || isNaN(val)) return;

        panel.style.display = 'block';
        const rule = rulesDB[cat];

        if(val > rule.limit) {
            badge.innerText = "❌ REJECTED (Non-Conformity)";
            badge.className = "status-badge status-reject";
            document.getElementById('analysisText').innerText = `Nilai ${val}${rule.unit} melebihi batas ${rule.limit}${rule.unit} (${rule.ref}).`;
            document.getElementById('caText').value = rule.ca_fail;
            document.getElementById('paText').value = rule.pa;
        } else {
            badge.innerText = "✅ ACCEPTED";
            badge.className = "status-badge status-accept";
            document.getElementById('analysisText').innerText = `Nilai ${val}${rule.unit} masih dalam batas toleransi ${rule.limit}${rule.unit}.`;
            document.getElementById('caText').value = "Tidak ada perbaikan diperlukan.";
            document.getElementById('paText').value = "Lanjutkan perawatan rutin.";
        }
    }

    function saveData() {
        const data = {
            id: new Date().toLocaleTimeString(),
            cat: document.getElementById('categorySelect').value,
            status: document.getElementById('statusBadge').innerText,
            img: document.getElementById('preview-img').src
        };
        let storage = JSON.parse(localStorage.getItem('ship_reports_v2')) || [];
        storage.push(data);
        localStorage.setItem('ship_reports_v2', JSON.stringify(storage));
        renderDashboard();
        alert("Laporan tersimpan!");
    }

    function renderDashboard() {
        const list = document.getElementById('dashboardList');
        let storage = JSON.parse(localStorage.getItem('ship_reports_v2')) || [];
        list.innerHTML = storage.reverse().map(item => `
            <div class="card">
                <img src="${item.img}" width="50" height="50" style="object-fit:cover; border-radius:5px;">
                <div>
                    <strong>${item.cat.toUpperCase()}</strong><br>
                    <small>${item.status}</small>
                </div>
            </div>
        `).join('');
    }

    window.onload = renderDashboard;
</script>

</body>
</html>
